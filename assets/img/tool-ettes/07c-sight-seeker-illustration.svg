  <text x="50" y="296" font-family="Georgia, serif" font-size="8" fill="#c9bfb2" text-anchor="start">Description:</text>
  <text x="50" y="310" font-family="Georgia, serif" font-size="8" fill="#f6f2ee" text-anchor="start">Tall ceramic vase · terracotta · ribbed texture · flared neck</text>
  <text x="50" y="324" font-family="Georgia, serif" font-size="8" fill="#c9bfb2" text-anchor="start">approx 28cm · displayed on white shelf</text>
