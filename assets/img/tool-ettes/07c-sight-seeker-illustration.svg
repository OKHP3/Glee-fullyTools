  <text x="60" y="456" font-family="Georgia, serif" font-size="8" fill="#c9bfb2" text-anchor="start">Likely: Gustavsberg or Royal Copenhagen influenced · 1950s–1970s · Confidence: 81%</text>
  <text x="60" y="470" font-family="Georgia, serif" font-size="8" fill="#d35b2d" text-anchor="start">Value: £40–£120 (depends on maker's mark underneath) · Ask: 'how do I find the mark?'</text>
