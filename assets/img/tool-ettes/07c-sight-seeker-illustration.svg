  <text x="500" y="458" font-family="Georgia, serif" font-size="8" fill="#d35b2d" text-anchor="start" font-style="italic">"Is this mushroom edible?"</text>
  <text x="500" y="470" font-family="Georgia, serif" font-size="9" fill="#9e3b2e" text-anchor="start" font-weight="bold">Point. Describe. Discover.</text>
