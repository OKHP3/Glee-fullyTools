  <circle cx="738" cy="38" r="7" fill="#f6f2ee" opacity="0.5"/>
  <circle cx="756" cy="38" r="7" fill="#f6f2ee" opacity="0.7"/>
  <!-- Resume doc panel -->
  <rect x="48" y="88" width="440" height="408" rx="10" fill="#fff" stroke="#c9bfb2" stroke-width="1"/>
  <rect x="48" y="88" width="440" height="36" rx="10" fill="#d35b2d"/>
  <text x="68" y="112" font-family="Georgia, serif" font-size="13" fill="#9e3b2e" text-anchor="start" font-weight="bold">Jane Doe · UX Researcher · Portland, OR</text>
  <text x="68" y="127" font-family="Georgia, serif" font-size="9" fill="#c9bfb2" text-anchor="start">jane@email.com · linkedin.com/in/janedoe · (503) 555-0121</text>
  <rect x="48" y="132" width="4" height="52" fill="#d35b2d"/>
  <text x="60" y="148" font-family="Georgia, serif" font-size="9" fill="#d35b2d" text-anchor="start" font-weight="bold">SUMMARY</text>
  <text x="60" y="162" font-family="Georgia, serif" font-size="9" fill="#3a3530" text-anchor="start">Human-centred designer with 6 yrs shaping digital products.</text>
  <text x="60" y="176" font-family="Georgia, serif" font-size="9" fill="#3a3530" text-anchor="start">Adept at research synthesis, workshop facilitation, and</text>
  <text x="60" y="190" font-family="Georgia, serif" font-size="9" fill="#3a3530" text-anchor="start">cross-functional collaboration. Fluent in Figma and Dovetail.</text>
  <rect x="48" y="194" width="440" height="2" fill="#c9bfb2"/>
  <text x="60" y="210" font-family="Georgia, serif" font-size="9" fill="#6b7c3f" text-anchor="start" font-weight="bold">EXPERIENCE</text>
  <text x="60" y="224" font-family="Georgia, serif" font-size="10" fill="#3a3530" text-anchor="start" font-weight="bold">Senior UX Researcher · Bloom Studio</text>
  <text x="60" y="238" font-family="Georgia, serif" font-size="9" fill="#c9bfb2" text-anchor="start">2022 – present · Remote</text>
  <text x="60" y="252" font-family="Georgia, serif" font-size="9" fill="#3a3530" text-anchor="start">• Led 40+ usability sessions; reduced onboarding drop 31%</text>
  <text x="60" y="266" font-family="Georgia, serif" font-size="9" fill="#3a3530" text-anchor="start">• Built a 3-sprint generative research programme</text>
  <text x="60" y="280" font-family="Georgia, serif" font-size="10" fill="#3a3530" text-anchor="start" font-weight="bold">UX Designer · Maple &amp; Co.</text>
  <text x="60" y="294" font-family="Georgia, serif" font-size="9" fill="#c9bfb2" text-anchor="start">2019 – 2022 · Hybrid</text>
  <text x="60" y="308" font-family="Georgia, serif" font-size="9" fill="#3a3530" text-anchor="start">• Redesigned checkout flow, lifting conversion by 18%</text>
