  <text x="105" y="351" font-family="Georgia, serif" font-size="8" fill="#f6f2ee" text-anchor="middle">User Research</text>
  <rect x="158" y="340" width="58" height="18" rx="9" fill="#6b7c3f"/>
  <text x="187" y="351" font-family="Georgia, serif" font-size="8" fill="#f6f2ee" text-anchor="middle">Figma</text>
  <rect x="224" y="340" width="76" height="18" rx="9" fill="#2d7c7c"/>
  <text x="262" y="351" font-family="Georgia, serif" font-size="8" fill="#f6f2ee" text-anchor="middle">Facilitation</text>
  <rect x="308" y="340" width="78" height="18" rx="9" fill="#c9922d"/>
  <text x="347" y="351" font-family="Georgia, serif" font-size="8" fill="#f6f2ee" text-anchor="middle">Dovetail</text>
  <rect x="48" y="366" width="440" height="2" fill="#c9bfb2"/>
  <text x="60" y="382" font-family="Georgia, serif" font-size="9" fill="#9e3b2e" text-anchor="start" font-weight="bold">EDUCATION</text>
  <text x="60" y="396" font-family="Georgia, serif" font-size="9" fill="#3a3530" text-anchor="start">MSc Information Design · University of Brighton · 2019</text>
  <text x="60" y="410" font-family="Georgia, serif" font-size="9" fill="#3a3530" text-anchor="start">BA Visual Communication · Portland State · 2017</text>
  <!-- Sidebar -->
  <rect x="508" y="88" width="256" height="408" rx="10" fill="#f6f2ee" stroke="#c9bfb2" stroke-width="1"/>
  <text x="528" y="112" font-family="Georgia, serif" font-size="10" fill="#9e3b2e" text-anchor="start" font-weight="bold">ATS Score</text>
  <rect x="528" y="120" width="216" height="14" rx="3" fill="#e8e3dc"/>
  <rect x="528" y="120" width="172" height="14" rx="3" fill="#6b7c3f"/>
  <text x="528" y="148" font-family="Georgia, serif" font-size="9" fill="#6b7c3f" text-anchor="start">80% keyword match</text>
  <text x="528" y="168" font-family="Georgia, serif" font-size="9" fill="#3a3530" text-anchor="start" font-style="italic">Tailored for: "Sr UX Researcher"</text>
  <text x="528" y="210" font-family="Georgia, serif" font-size="9" fill="#c9bfb2" text-anchor="start">Word count: 342</text>
  <text x="528" y="224" font-family="Georgia, serif" font-size="9" fill="#6b7c3f" text-anchor="start">Action verbs: 12 ✓</text>
  <text x="528" y="238" font-family="Georgia, serif" font-size="9" fill="#c9922d" text-anchor="start">Jargon flags: 2 ⚠</text>
  <rect x="528" y="268" width="216" height="60" rx="7" fill="#d35b2d"/>
  <text x="636" y="293" font-family="Georgia, serif" font-size="10" fill="#f6f2ee" text-anchor="middle" font-weight="bold">Export ready</text>
  <text x="636" y="308" font-family="Georgia, serif" font-size="8" fill="#f6f2ee" text-anchor="middle">PDF · DOCX · Plain text</text>
  <text x="760" y="520" font-family="Georgia, serif" font-size="8" fill="#c9bfb2" text-anchor="end">via Resume Builder · Glee-fully Toolbox</text>
