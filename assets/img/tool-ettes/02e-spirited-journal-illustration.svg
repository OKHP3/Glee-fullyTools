<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 534" width="800" height="534" role="img" aria-label="A retro-bright spirits tasting journal showing a whisky notes card with colour, nose, palate and finish descriptors, and a bottle collection grid">
  <defs>
    <filter id="spj" x="-5%" y="-5%" width="110%" height="115%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#9e3b2e" flood-opacity="0.12"/>
    </filter>
  </defs>
  <rect width="800" height="534" fill="#f6f2ee"/>
  <rect x="0" y="0" width="800" height="6" fill="#d35b2d"/>
