<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 534" width="800" height="534" role="img" aria-label="A retro-bright cover letter document editor with a personalized letter, structure prompts and tone meter">
  <defs>
    <filter id="lc" x="-5%" y="-5%" width="110%" height="115%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#9e3b2e" flood-opacity="0.12"/>
    </filter>
  </defs>
  <rect width="800" height="534" fill="#f6f2ee"/>
  <rect x="0" y="0" width="800" height="6" fill="#d35b2d"/>
  <rect x="24" y="22" width="752" height="490" rx="14" fill="#e8e3dc" stroke="#c9bfb2" stroke-width="1.5" filter="url(#lc)"/>
  <rect x="24" y="22" width="752" height="52" rx="14" fill="#d35b2d"/>
  <rect x="24" y="52" width="752" height="22" fill="#d35b2d"/>
  <text x="48" y="54" font-family="Georgia, serif" font-size="18" font-weight="bold" fill="#f6f2ee" letter-spacing="0.5">Letter Composer</text>
  <text x="48" y="70" font-family="Georgia, serif" font-size="11" fill="#f6f2ee" opacity="0.8" font-style="italic">Cover letters that open doors — not eyes wide shut.</text>
  <circle cx="720" cy="38" r="7" fill="#f6f2ee" opacity="0.3"/>
  <circle cx="738" cy="38" r="7" fill="#f6f2ee" opacity="0.5"/>
  <circle cx="756" cy="38" r="7" fill="#f6f2ee" opacity="0.7"/>
  <rect x="40" y="88" width="440" height="408" rx="10" fill="#fff" stroke="#c9bfb2" stroke-width="1"/>
  <rect x="40" y="88" width="440" height="32" rx="10" fill="#d35b2d"/>
  <text x="60" y="109" font-family="Georgia, serif" font-size="11" fill="#f6f2ee" text-anchor="start" font-weight="bold">Cover Letter — Solstice Apps · Product Designer</text>
  <text x="60" y="136" font-family="Georgia, serif" font-size="9" fill="#c9bfb2" text-anchor="start">27 May 2026</text>
  <text x="60" y="155" font-family="Georgia, serif" font-size="10" fill="#3a3530" text-anchor="start" font-weight="bold">Dear Hiring Team,</text>
  <text x="60" y="174" font-family="Georgia, serif" font-size="9" fill="#3a3530" text-anchor="start">When I read your job post for a Product Designer, I recognised</text>
  <text x="60" y="187" font-family="Georgia, serif" font-size="9" fill="#3a3530" text-anchor="start">the rhythm immediately — a small team moving fast, making things</text>
  <text x="60" y="200" font-family="Georgia, serif" font-size="9" fill="#3a3530" text-anchor="start">real, and actually caring about the humans on the other side.</text>
  <text x="60" y="220" font-family="Georgia, serif" font-size="9" fill="#3a3530" text-anchor="start">At Bloom Studio, I redesigned the onboarding experience for a</text>
  <text x="60" y="233" font-family="Georgia, serif" font-size="9" fill="#3a3530" text-anchor="start">300k-user SaaS product, reducing drop-off by 31% in 3 months.</text>
  <text x="60" y="246" font-family="Georgia, serif" font-size="9" fill="#3a3530" text-anchor="start">I led discovery, prototyped in Figma, ran usability sessions,</text>
  <text x="60" y="259" font-family="Georgia, serif" font-size="9" fill="#3a3530" text-anchor="start">and shipped — then iterated based on real-world behaviour.</text>
  <text x="60" y="279" font-family="Georgia, serif" font-size="9" fill="#3a3530" text-anchor="start">What draws me most to Solstice is your approach to transparency.</text>
  <text x="60" y="292" font-family="Georgia, serif" font-size="9" fill="#3a3530" text-anchor="start">The public changelog shows a company that trusts its users.</text>
  <text x="60" y="305" font-family="Georgia, serif" font-size="9" fill="#3a3530" text-anchor="start">I'd love to help build the next chapter.</text>
  <text x="60" y="328" font-family="Georgia, serif" font-size="9" fill="#3a3530" text-anchor="start">Warmly,</text>
  <text x="60" y="348" font-family="Georgia, serif" font-size="12" fill="#9e3b2e" text-anchor="start" font-weight="bold" font-style="italic">Jane Doe</text>
  <text x="60" y="364" font-family="Georgia, serif" font-size="8" fill="#c9bfb2" text-anchor="start">jane@email.com · linkedin.com/in/janedoe</text>
  <rect x="500" y="88" width="264" height="408" rx="10" fill="#f6f2ee" stroke="#c9bfb2" stroke-width="1"/>
  <text x="520" y="112" font-family="Georgia, serif" font-size="11" fill="#9e3b2e" text-anchor="start" font-weight="bold">Composer Guide</text>
  <text x="520" y="135" font-family="Georgia, serif" font-size="9" fill="#9e3b2e" text-anchor="start" font-weight="bold">Tone:</text>
  <rect x="520" y="142" width="224" height="10" rx="3" fill="#e8e3dc"/>
  <rect x="520" y="142" width="168" height="10" rx="3" fill="#6b7c3f"/>
  <text x="520" y="166" font-family="Georgia, serif" font-size="8" fill="#6b7c3f" text-anchor="start">Professional → Warm  75%</text>
  <text x="520" y="186" font-family="Georgia, serif" font-size="9" fill="#6b7c3f" text-anchor="start">Word count: 228  ✓</text>
  <text x="520" y="200" font-family="Georgia, serif" font-size="9" fill="#6b7c3f" text-anchor="start">Paragraphs: 4  ✓</text>
  <text x="520" y="214" font-family="Georgia, serif" font-size="9" fill="#6b7c3f" text-anchor="start">Jargon flags: 0  ✓</text>
  <rect x="520" y="228" width="224" height="2" fill="#c9bfb2"/>
  <text x="520" y="246" font-family="Georgia, serif" font-size="9" fill="#9e3b2e" text-anchor="start" font-weight="bold">Structure check:</text>
  <text x="520" y="262" font-family="Georgia, serif" font-size="9" fill="#6b7c3f" text-anchor="start">✓  Hook paragraph</text>
  <text x="520" y="277" font-family="Georgia, serif" font-size="9" fill="#6b7c3f" text-anchor="start">✓  Relevant proof point</text>
  <text x="520" y="292" font-family="Georgia, serif" font-size="9" fill="#6b7c3f" text-anchor="start">✓  Company connection</text>
  <text x="520" y="307" font-family="Georgia, serif" font-size="9" fill="#6b7c3f" text-anchor="start">✓  Warm close</text>
  <rect x="520" y="322" width="224" height="2" fill="#c9bfb2"/>
  <text x="520" y="340" font-family="Georgia, serif" font-size="9" fill="#9e3b2e" text-anchor="start" font-weight="bold">Personalisation tips:</text>
  <text x="520" y="356" font-family="Georgia, serif" font-size="8" fill="#3a3530" text-anchor="start">🎯 Mention their changelog</text>
  <text x="520" y="370" font-family="Georgia, serif" font-size="8" fill="#3a3530" text-anchor="start">🎯 Name the hiring manager</text>
  <text x="520" y="384" font-family="Georgia, serif" font-size="8" fill="#3a3530" text-anchor="start">🎯 Link one metric to their KPIs</text>
  <text x="520" y="410" font-family="Georgia, serif" font-size="8" fill="#d35b2d" text-anchor="start" font-weight="bold">Export: PDF · DOCX · Plain text</text>
  <text x="520" y="426" font-family="Georgia, serif" font-size="8" fill="#c9bfb2" text-anchor="start">Versions saved: 3</text>
  <text x="760" y="520" font-family="Georgia, serif" font-size="8" fill="#c9bfb2" text-anchor="end">via Letter Composer · Glee-fully Toolbox</text>
</svg>