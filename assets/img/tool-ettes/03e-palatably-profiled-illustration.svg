  <text x="60" y="470" font-family="Georgia, serif" font-size="9" fill="#3a3530" text-anchor="start">Home: ~£15/day · Eating out: £20–40/meal · Splurge: £80+</text>
  <rect x="500" y="88" width="264" height="400" rx="10" fill="#f6f2ee" stroke="#c9bfb2" stroke-width="1"/>
  <text x="520" y="112" font-family="Georgia, serif" font-size="11" fill="#9e3b2e" text-anchor="start" font-weight="bold">Profile powers:</text>
  <text x="520" y="134" font-family="Georgia, serif" font-size="9" fill="#3a3530" text-anchor="start">✓  Menu Conductor uses your</text>
  <text x="520" y="148" font-family="Georgia, serif" font-size="9" fill="#3a3530" text-anchor="start">   profile to build menus that</text>
  <text x="520" y="162" font-family="Georgia, serif" font-size="9" fill="#c9bfb2" text-anchor="start">   actually fit your life.</text>
  <text x="520" y="182" font-family="Georgia, serif" font-size="9" fill="#3a3530" text-anchor="start">✓  Flavor Meister tracks how</text>
  <text x="520" y="196" font-family="Georgia, serif" font-size="9" fill="#c9bfb2" text-anchor="start">   your palate evolves over time.</text>
  <text x="520" y="216" font-family="Georgia, serif" font-size="9" fill="#3a3530" text-anchor="start">✓  Wishful Tastes filters recs</text>
  <text x="520" y="230" font-family="Georgia, serif" font-size="9" fill="#c9bfb2" text-anchor="start">   for your allergies + style.</text>
  <text x="520" y="250" font-family="Georgia, serif" font-size="9" fill="#3a3530" text-anchor="start">✓  Pantry Shopper knows what</text>
  <text x="520" y="264" font-family="Georgia, serif" font-size="9" fill="#c9bfb2" text-anchor="start">   you'll actually use.</text>
