  <rect x="40" y="88" width="440" height="28" rx="10" fill="#d35b2d"/>
  <text x="260" y="107" font-family="Georgia, serif" font-size="12" fill="#f6f2ee" text-anchor="middle" font-weight="bold">Food Profile — Alex</text>
  <text x="60" y="134" font-family="Georgia, serif" font-size="9" fill="#9e3b2e" text-anchor="start" font-weight="bold">Eating style:</text>
