  <text x="520" y="444" font-family="Georgia, serif" font-size="8" fill="#9e3b2e" text-anchor="start">Profile last updated:</text>
  <text x="520" y="458" font-family="Georgia, serif" font-size="8" fill="#c9bfb2" text-anchor="start">May 27, 2026</text>
  <text x="520" y="474" font-family="Georgia, serif" font-size="8" fill="#c9bfb2" text-anchor="start">Dishes logged: 87</text>
  <text x="760" y="520" font-family="Georgia, serif" font-size="8" fill="#c9bfb2" text-anchor="end">via Palatably Profiled · Glee-fully Toolbox</text>
</svg>