  <text x="520" y="322" font-family="Georgia, serif" font-size="8" fill="#d35b2d" text-anchor="start" font-style="italic">"What can I eat at this</text>
  <text x="520" y="336" font-family="Georgia, serif" font-size="8" fill="#d35b2d" text-anchor="start" font-style="italic">Thai restaurant?"</text>
  <text x="520" y="356" font-family="Georgia, serif" font-size="8" fill="#d35b2d" text-anchor="start" font-style="italic">"Suggest a pescatarian</text>
  <text x="520" y="370" font-family="Georgia, serif" font-size="8" fill="#d35b2d" text-anchor="start" font-style="italic">meal-prep for Sunday."</text>
  <text x="520" y="390" font-family="Georgia, serif" font-size="8" fill="#d35b2d" text-anchor="start" font-style="italic">"Am I eating enough</text>
  <text x="520" y="404" font-family="Georgia, serif" font-size="8" fill="#d35b2d" text-anchor="start" font-style="italic">variety this month?"</text>
