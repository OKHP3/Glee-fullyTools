  <text x="60" y="378" font-family="Georgia, serif" font-size="12" fill="#9e3b2e" text-anchor="start" font-weight="bold">🎯  Herringbone tweed — identified</text>
  <text x="60" y="396" font-family="Georgia, serif" font-size="9" fill="#3a3530" text-anchor="start">Origin: Donegal, Ireland · c. 1830s · Originally woven for moorland camouflage</text>
  <text x="60" y="412" font-family="Georgia, serif" font-size="8" fill="#c9bfb2" text-anchor="start">Construction: 2/2 twill weave · rough texture · diagonal V-shapes</text>
  <text x="60" y="428" font-family="Georgia, serif" font-size="8" fill="#3a3530" text-anchor="start">Where to find: Harris Tweed mills · Abraham Moon · English Eccentrics · vintage</text>
  <text x="60" y="444" font-family="Georgia, serif" font-size="8" fill="#9e3b2e" text-anchor="start">Pairs with: camel · navy · rust · charcoal · Best for: autumn jackets, upholstery</text>
