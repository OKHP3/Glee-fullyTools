  <text x="252" y="362" font-family="Georgia, serif" font-size="9" fill="#3a3530" text-anchor="start">31 moments · 14 photos</text>
  <text x="252" y="378" font-family="Georgia, serif" font-size="9" fill="#3a3530" text-anchor="start">6 restaurants · 4 temples</text>
