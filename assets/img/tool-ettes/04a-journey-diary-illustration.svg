  <text x="56" y="180" font-family="Georgia, serif" font-size="10" fill="#9e3b2e" text-anchor="start" font-weight="bold">Day 3 — May 14</text>
  <text x="56" y="196" font-family="Georgia, serif" font-size="9" fill="#3a3530" text-anchor="start">Woke to temple bells. Walked Philosopher's Path at 6am —</text>
  <text x="56" y="209" font-family="Georgia, serif" font-size="9" fill="#3a3530" text-anchor="start">the light through the cherry trees was almost embarrassingly</text>
  <text x="56" y="222" font-family="Georgia, serif" font-size="9" fill="#3a3530" text-anchor="start">beautiful. Matcha latte and a book at % Arabica.</text>
  <text x="56" y="235" font-family="Georgia, serif" font-size="9" fill="#3a3530" text-anchor="start">Fushimi Inari in the afternoon — went beyond the crowds.</text>
  <text x="56" y="260" font-family="Georgia, serif" font-size="10" fill="#9e3b2e" text-anchor="start" font-weight="bold">Day 4 — May 15</text>
  <text x="56" y="276" font-family="Georgia, serif" font-size="9" fill="#3a3530" text-anchor="start">Nishiki Market for breakfast snacks. Best: fresh tofu with</text>
  <text x="56" y="289" font-family="Georgia, serif" font-size="9" fill="#3a3530" text-anchor="start">ponzu, sesame dumplings. Kinkaku-ji golden and blinding.</text>
  <text x="56" y="302" font-family="Georgia, serif" font-size="9" fill="#3a3530" text-anchor="start">Evening: kappo counter, chef's choice. Outstanding.</text>
  <text x="56" y="320" font-family="Georgia, serif" font-size="8" fill="#c9922d" text-anchor="start">Today's highlight: ⭐⭐⭐⭐⭐</text>
  <text x="56" y="335" font-family="Georgia, serif" font-size="8" fill="#c9bfb2" text-anchor="start">Spend: ¥12,400 (£65) · Steps: 24,102</text>
