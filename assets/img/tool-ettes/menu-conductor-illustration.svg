<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 534" width="800" height="534">
  <rect width="800" height="534" fill="#f6f2ee"/>
  <rect x="60" y="60" width="680" height="414" rx="18" fill="#e8e3dc" stroke="#c9bfb2" stroke-width="2"/>
  <rect x="60" y="60" width="680" height="8" rx="4" fill="#d35b2d"/>
  <!-- Calendar / menu grid motif -->
  <rect x="160" y="120" width="480" height="280" rx="10" fill="#f6f2ee" stroke="#c9bfb2" stroke-width="1.5"/>
  <!-- Calendar header -->
  <rect x="160" y="120" width="480" height="40" rx="10" fill="#d35b2d" opacity="0.2"/>
  <text x="400" y="147" font-family="Georgia, serif" font-size="15" fill="#9e3b2e" text-anchor="middle" font-weight="bold">Weekly Menu</text>
  <!-- Grid lines -->
  <line x1="228" y1="160" x2="228" y2="400" stroke="#c9bfb2" stroke-width="1"/>
  <line x1="296" y1="160" x2="296" y2="400" stroke="#c9bfb2" stroke-width="1"/>
  <line x1="364" y1="160" x2="364" y2="400" stroke="#c9bfb2" stroke-width="1"/>
  <line x1="432" y1="160" x2="432" y2="400" stroke="#c9bfb2" stroke-width="1"/>
  <line x1="500" y1="160" x2="500" y2="400" stroke="#c9bfb2" stroke-width="1"/>
  <line x1="568" y1="160" x2="568" y2="400" stroke="#c9bfb2" stroke-width="1"/>
  <line x1="160" y1="215" x2="640" y2="215" stroke="#c9bfb2" stroke-width="1"/>
  <line x1="160" y1="270" x2="640" y2="270" stroke="#c9bfb2" stroke-width="1"/>
  <line x1="160" y1="325" x2="640" y2="325" stroke="#c9bfb2" stroke-width="1"/>
  <!-- Day labels -->
  <text x="194" y="182" font-family="Georgia, serif" font-size="11" fill="#9e3b2e" text-anchor="middle">Mon</text>
  <text x="262" y="182" font-family="Georgia, serif" font-size="11" fill="#9e3b2e" text-anchor="middle">Tue</text>
  <text x="330" y="182" font-family="Georgia, serif" font-size="11" fill="#9e3b2e" text-anchor="middle">Wed</text>
  <text x="398" y="182" font-family="Georgia, serif" font-size="11" fill="#9e3b2e" text-anchor="middle">Thu</text>
  <text x="466" y="182" font-family="Georgia, serif" font-size="11" fill="#9e3b2e" text-anchor="middle">Fri</text>
  <text x="534" y="182" font-family="Georgia, serif" font-size="11" fill="#9e3b2e" text-anchor="middle">Sat</text>
  <text x="602" y="182" font-family="Georgia, serif" font-size="11" fill="#9e3b2e" text-anchor="middle">Sun</text>
  <!-- Sample meal dots -->
  <circle cx="194" cy="242" r="14" fill="#d35b2d" opacity="0.5"/>
  <circle cx="330" cy="242" r="14" fill="#d35b2d" opacity="0.5"/>
  <circle cx="466" cy="297" r="14" fill="#d35b2d" opacity="0.5"/>
  <circle cx="602" cy="352" r="14" fill="#d35b2d" opacity="0.5"/>
  <rect x="200" y="420" width="400" height="36" rx="8" fill="#d35b2d" opacity="0.12"/>
  <text x="400" y="443" font-family="Georgia, serif" font-size="14" fill="#9e3b2e" text-anchor="middle" font-style="italic">Illustration coming soon</text>
</svg>
